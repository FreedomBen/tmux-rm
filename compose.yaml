services:
  termigate:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8888:8888"
    # SECRET_KEY_BASE must be set in your shell or a sibling .env file before
    # running `podman compose up`. Generate one with:
    #   openssl rand -base64 48
    # The server refuses to start without it (or with a placeholder value).
    environment:
      - SECRET_KEY_BASE
      - PORT=8888
      - PHX_HOST=localhost
      # The image bakes TERMIGATE_CONFIG_PATH=/var/lib/termigate/config.yaml,
      # which points at the persistent volume mounted below. Override only if
      # you map a different writable path into the container.
      # - TERMIGATE_CONFIG_PATH=/var/lib/termigate/config.yaml
      # Optional: pre-seed the first-run setup token. If unset, termigate
      # generates one on boot and prints the full /setup URL to the
      # container logs (`podman logs termigate`). Either way the token is
      # burned after the first admin is created. /setup is always
      # restricted to loopback — for remote deploys, SSH-tunnel the port:
      #   ssh -L 8888:127.0.0.1:8888 user@host
      # - TERMIGATE_SETUP_TOKEN=your-pre-seeded-token
      # If running behind a reverse proxy (Caddy, nginx, Traefik, etc.),
      # set this to a comma-separated list of proxy CIDRs so
      # X-Forwarded-For is honored. Without it, rate limits and auth logs
      # see the proxy IP, not the real client.
      # - TERMIGATE_TRUSTED_PROXIES=127.0.0.0/8,::1/128
      # Uncomment for host tmux access:
      # - TERMIGATE_TMUX_SOCKET=/tmp/tmux-host/default
    # Image default is uid 10001 (built-in `termigate` user). Override to your
    # host UID:GID only when mounting a host tmux socket below.
    user: "10001:10001"
    volumes:
      # Persistent state (admin credentials, quick-action config). Wiping
      # this volume returns the server to first-run setup state.
      - termigate-data:/var/lib/termigate
      # Uncomment for host tmux access (replace 1000 with your UID, and set
      # `user: "1000:1000"` above to match):
      # - /tmp/tmux-1000:/tmp/tmux-host

volumes:
  termigate-data:
