# termigate configuration (example)
#
# Copy this file to /etc/termigate/config.yaml (or set TERMIGATE_CONFIG_PATH
# in the systemd unit) to customize.

# termigate is single-user; the `auth` section below is normally written by
# the first-run setup flow in the web UI rather than edited by hand.
# Passwords are hashed with PBKDF2-HMAC-SHA512 (via pbkdf2_elixir) and stored
# in the self-identifying format `$pbkdf2-sha512$<iters>$<salt>$<hash>` so the
# algorithm and work factor can be migrated in place without losing logins.
#
# auth:
#   username: admin
#   password_hash: $pbkdf2-sha512$160000$<salt-b64>$<hash-b64>
#   session_ttl_hours: 168

# actions:
